name: Claude Implement
description: >
  Runs Claude Code to implement a JIRA ticket on a feature branch.
  Handles branch detection (development → Development → main → master),
  task file generation, running claude, detecting changes, and committing.

inputs:
  jira_key:
    description: JIRA issue key — used as branch name and in commit message
    required: true
  jira_summary:
    description: JIRA issue summary (one-line title)
    required: true
  jira_description:
    description: JIRA issue description (full context for Claude)
    required: true
  anthropic_api_key:
    description: Anthropic API key — if not provided, ANTHROPIC_API_KEY env var must be set at the job level
    required: false
    default: ""
  extra_instructions:
    description: Additional instructions appended to the task file (repo-specific)
    required: false
    default: ""
  model:
    description: Claude model to use
    required: false
    default: sonnet
  git_user_name:
    description: Git author name for automated commits
    required: false
    default: "Claude Code Bot"
  git_user_email:
    description: Git author email for automated commits
    required: false
    default: "claude-code-bot@gigatech.net"
  artifact_retention_days:
    description: How many days to retain the claude output log artifact
    required: false
    default: "30"

outputs:
  changes_made:
    description: Whether Claude made any changes (true/false)
    value: ${{ steps.detect.outputs.changes_made }}
  branch_name:
    description: The feature branch name (same as jira_key)
    value: ${{ inputs.jira_key }}
  base_branch:
    description: The base branch the feature branch was created from
    value: ${{ steps.branch.outputs.base_branch }}

runs:
  using: composite
  steps:
    - name: Resolve base branch
      id: branch
      shell: bash
      run: |
        BASE_BRANCH=""
        for CANDIDATE in development Development main master; do
          if git ls-remote --exit-code --heads origin "$CANDIDATE" > /dev/null 2>&1; then
            BASE_BRANCH="$CANDIDATE"
            echo "Base branch: $BASE_BRANCH"
            break
          fi
        done
        if [ -z "$BASE_BRANCH" ]; then
          echo "Error: could not find development, Development, main, or master branch"
          exit 1
        fi
        echo "base_branch=$BASE_BRANCH" >> $GITHUB_OUTPUT

    - name: Configure git
      shell: bash
      run: |
        git config --global user.name "${{ inputs.git_user_name }}"
        git config --global user.email "${{ inputs.git_user_email }}"

    - name: Create feature branch
      shell: bash
      run: |
        git fetch origin ${{ steps.branch.outputs.base_branch }}
        git checkout -b ${{ inputs.jira_key }} origin/${{ steps.branch.outputs.base_branch }}
        git push -u origin ${{ inputs.jira_key }}

    - name: Install Claude Code CLI
      shell: bash
      run: npm install -g @anthropic-ai/claude-code

    - name: Create task file
      shell: bash
      env:
        JIRA_KEY: ${{ inputs.jira_key }}
        JIRA_SUMMARY: ${{ inputs.jira_summary }}
        JIRA_DESCRIPTION: ${{ inputs.jira_description }}
        EXTRA_INSTRUCTIONS: ${{ inputs.extra_instructions }}
      run: |
        cat > /tmp/claude-task.md << TASK_EOF
        # JIRA Issue: ${JIRA_KEY}

        ## Summary
        ${JIRA_SUMMARY}

        ## Description
        ${JIRA_DESCRIPTION}

        ## Instructions
        1. Read CLAUDE.md for project context if it exists
        2. Implement the changes described above
        3. Follow existing patterns in the codebase
        4. Commit your changes using the /commit skill for proper formatting
        5. Do NOT push to remote — the workflow will handle that

        ## Do NOT Run Linting
        Do NOT invoke /lint-and-fix or run Docker-based linters. Linting runs
        automatically after this PR is created.

        ${EXTRA_INSTRUCTIONS}
        TASK_EOF

    - name: Run Claude Code
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key != '' && inputs.anthropic_api_key || env.ANTHROPIC_API_KEY }}
      run: |
        claude \
          --dangerously-skip-permissions \
          --model ${{ inputs.model }} \
          -p "$(cat /tmp/claude-task.md)" \
          2>&1 | tee /tmp/claude-output.log

    - name: Detect changes
      id: detect
      shell: bash
      run: |
        UNCOMMITTED=$(git diff --quiet && git diff --cached --quiet && echo "false" || echo "true")
        COMMITS_AHEAD=$(git log "origin/${{ inputs.jira_key }}..HEAD" --oneline 2>/dev/null | wc -l | tr -d ' ')
        if [ "$UNCOMMITTED" = "true" ] || [ "$COMMITS_AHEAD" -gt "0" ]; then
          echo "changes_made=true" >> $GITHUB_OUTPUT
          echo "✅ Changes were made by Claude Code" >> $GITHUB_STEP_SUMMARY
        else
          echo "changes_made=false" >> $GITHUB_OUTPUT
          echo "❌ No changes were made by Claude Code" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Commit uncommitted changes
      if: steps.detect.outputs.changes_made == 'true'
      shell: bash
      env:
        JIRA_KEY: ${{ inputs.jira_key }}
        JIRA_SUMMARY: ${{ inputs.jira_summary }}
      run: |
        if ! git diff --quiet || ! git diff --cached --quiet; then
          git add .
          COMMIT_DESC=$(echo "$JIRA_SUMMARY" | head -c 72)
          DIFF_STATS=$(git diff --cached --stat | tail -n 1)
          COMMIT_MSG_FILE=$(mktemp)
          printf '%s: %s\n\nImplemented via Claude Code automation.\n\n%s\n\nCo-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>\n' \
            "$JIRA_KEY" "$COMMIT_DESC" "$DIFF_STATS" > "$COMMIT_MSG_FILE"
          git commit -F "$COMMIT_MSG_FILE"
        fi

    - name: Upload Claude output log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: claude-output-${{ inputs.jira_key }}
        path: /tmp/claude-output.log
        retention-days: ${{ inputs.artifact_retention_days }}
